<!DOCTYPE html>
<html>
<head>
  <base href="/table-scan-web-app-deploy/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="table_serve">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>table_serve</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
        // Redirect all paths to index.html for SPA
        var path = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;
        window.location.replace("/?" + "redirect=" + encodeURIComponent(path + search + hash));
    </script>
</body>
